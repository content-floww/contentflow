<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentFlow — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #FF4D00;
    --black: #080808;
    --card: #161616;
    --border: #232323;
    --white: #F0EEE9;
    --muted: #A0A0A0;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--black);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .logo {
    font-family: var(--serif);
    font-size: 1.5rem;
    color: var(--white);
    text-decoration: none;
    margin-bottom: 2.5rem;
    display: block;
    text-align: center;
  }
  .logo em { color: var(--accent); font-style: italic; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
  }

  .card h1 {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }

  .card h1 em { color: var(--accent); font-style: italic; }

  .card p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.75rem;
    line-height: 1.6;
  }

  .form-group { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.03em;
  }

  input[type="email"] {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--white);
    font-family: var(--sans);
    font-size: 0.9rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="email"]:focus { border-color: rgba(255,77,0,0.5); }
  input[type="email"]::placeholder { color: #333; }

  .btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 5px;
    color: var(--white);
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.75rem;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 0.5rem;
  }

  .btn:hover { background: #e04300; }
  .btn:disabled { background: #3a2010; color: #7a4020; cursor: not-allowed; }

  .success {
    display: none;
    text-align: center;
    padding: 1.5rem 0;
  }

  .success-icon {
    font-family: var(--serif);
    font-size: 2.5rem;
    font-style: italic;
    color: var(--accent);
    margin-bottom: 1rem;
    display: block;
  }

  .success h2 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }

  .success p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0;
  }

  .error-msg {
    display: none;
    background: rgba(255,77,0,0.08);
    border: 1px solid rgba(255,77,0,0.25);
    border-radius: 4px;
    color: #ff8a6a;
    font-size: 0.8rem;
    padding: 0.65rem 0.85rem;
    margin-top: 0.75rem;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .back-link {
    display: block;
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    text-decoration: none;
    margin-top: 1.5rem;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--white); }
</style>
</head>
<body>

<a href="index.html" class="logo">Content<em>Flow</em></a>

<div class="card">
  <!-- Login Form -->
  <div id="loginForm">
    <h1>Sign in to <em>ContentFlow</em></h1>
    <p>Enter your email and we'll send you a magic link to access your platform.</p>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
    </div>

    <button class="btn" id="sendBtn">Send magic link →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Success State -->
  <div class="success" id="successState">
    <span class="success-icon">✓</span>
    <h2>Check your inbox</h2>
    <p>We sent a magic link to <strong id="sentEmail"></strong>.<br>Click it to access your platform.</p>
  </div>
</div>

<a href="index.html" class="back-link">← Back to ContentFlow</a>

<script>
const SUPABASE_URL = 'https://urzbdammrtjymnzhsveg.supabase.co'
const SUPABASE_KEY = 'sb_publishable_kaKGdS7fRQgoSmsoEIvgbg_A8kYlDnl'

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const emailInput = document.getElementById('emailInput')
const sendBtn = document.getElementById('sendBtn')
const errorMsg = document.getElementById('errorMsg')
const loginForm = document.getElementById('loginForm')
const successState = document.getElementById('successState')
const sentEmail = document.getElementById('sentEmail')

// Check if already logged in
;(async () => {
  const { data: { session } } = await sb.auth.getSession()
  if (session) {
    // Get their plan and redirect
    const { data: profile } = await sb.from('profiles').select('plan').eq('id', session.user.id).single()
    if (profile?.plan) {
      location.href = `platform-${profile.plan}.html`
    }
  }
})()

// Send magic link
sendBtn.addEventListener('click', async () => {
  const email = emailInput.value.trim()

  if (!email || !email.includes('@')) {
    showError('Please enter a valid email address.')
    return
  }

  sendBtn.disabled = true
  sendBtn.textContent = 'Sending…'
  errorMsg.style.display = 'none'

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: 'https://content-floww.github.io/contentflow/redirect.html'
    }
  })

  if (error) {
    showError(error.message)
    sendBtn.disabled = false
    sendBtn.textContent = 'Send magic link →'
    return
  }

  // Show success
  sentEmail.textContent = email
  loginForm.style.display = 'none'
  successState.style.display = 'block'
})

emailInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendBtn.click()
})

function showError(msg) {
  errorMsg.textContent = msg
  errorMsg.style.display = 'block'
}
</script>
</body>
</html>
